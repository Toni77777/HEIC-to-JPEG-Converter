# ──────────────────────────────────────────────────────────────
# Build & Release — HEIC to JPEG Converter
#
# Builds an unsigned macOS .app and packages it into a .dmg.
# On version tags (v*) a GitHub Release is created automatically.
# On pushes to main only the build + artifact upload runs.
#
# No Apple Developer account required.
# The resulting app is UNSIGNED and UNNOTARIZED — see README
# for Gatekeeper instructions users must follow.
# ──────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]          # e.g. v1.0.0, v2.1.3-beta

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      # ── Determine version string ─────────────────────────
      # Tag push  → strip leading "v" (v1.2.3 → 1.2.3)
      # Main push → date + short SHA
      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # ── Build (unsigned) ─────────────────────────────────
      - name: Build
        run: |
          xcodebuild build \
            -project HEICConverter/HEICConverter.xcodeproj \
            -scheme HEICConverter \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY=""          \
            CODE_SIGNING_REQUIRED=NO       \
            CODE_SIGNING_ALLOWED=NO        \
            MACOSX_DEPLOYMENT_TARGET=15.0

      # ── Package DMG ──────────────────────────────────────
      - name: Package DMG
        run: |
          brew install create-dmg

          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release/HEIC to JPEG Converter.app"
          STAGING="$RUNNER_TEMP/dmg_staging"
          DMG_NAME="HEIC-to-JPEG-${{ steps.version.outputs.version }}.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"

          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"

          create-dmg \
            --volname "HEIC to JPEG Converter" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "HEIC to JPEG Converter.app" 150 185 \
            --app-drop-link 450 185 \
            "$DMG_PATH" \
            "$STAGING"

          # Expose path for later steps
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_ENV"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_ENV"

      # ── Upload artifact (every run) ──────────────────────
      # Available from the Actions tab even without a release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.dmg_name }}"
          path: "${{ env.dmg_path }}"

      # ── Create GitHub Release (tags only) ────────────────
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ env.dmg_path }}#${{ env.dmg_name }}" \
            --title "HEIC to JPEG Converter ${{ steps.version.outputs.version }}" \
            --generate-notes
